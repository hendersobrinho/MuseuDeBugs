<section class="groove-strip" aria-label="Filtros do acervo">
  <div class="pad-bank">
    @for (pad of pads; track pad.code; let index = $index) {
      <button
        type="button"
        class="pad pad-{{ index % 4 }}"
        [class.active]="activeFilter.code === pad.code"
        (click)="selectFilter(pad)"
      >
        <span>{{ pad.code }}</span>
        <small>{{ pad.label }}</small>
      </button>
    }
  </div>

  <div class="knob-bank" aria-hidden="true">
    <div class="knob-block">
      <span class="knob"></span>
      <small>causa</small>
    </div>
    <div class="knob-block">
      <span class="knob level-two"></span>
      <small>solucao</small>
    </div>
    <div class="knob-block">
      <span class="knob level-three"></span>
      <small>risco</small>
    </div>
  </div>
</section>
