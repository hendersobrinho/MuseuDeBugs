<header class="topbar">
  <div class="led-row" aria-hidden="true">
      <span class="led green"></span>
      <span class="led amber"></span>
      <span class="led violet"></span>
    </div>
  <div>
    <p class="eyebrow">Arquivos Técnicos</p>
    <h1>Acervo de Bugs</h1>
  </div>

  <div class="topbar-actions">
    <label class="search-box">
      <span aria-hidden="true">⌕</span>
      <input
        type="search"
        placeholder="Buscar por id ou nome..."
        [ngModel]="termoBusca"
        (ngModelChange)="aoAlterarTermoBusca($event)"
        (keydown.enter)="buscarBugPorId()"
      />
    </label>

    <button class="primary-button" type="button" (click)="buscarBugPorId()">
      <span>Buscar</span>
    </button>
  </div>

  @if (carregandoBusca) {
    <p>Buscando bug...</p>
  }

  @if (erroBusca) {
    <p>{{ erroBusca }}</p>
  }
</header>
