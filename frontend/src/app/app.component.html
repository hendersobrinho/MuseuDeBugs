
<div class="app-shell">
  <app-sidebar />

  <main class="workspace">
    <app-topbar
      [termoBusca]="termoBusca"
      (buscaPorIdConcluida)="handleBuscaPorIdConcluida($event)"
      (termoBuscaAlterado)="handleTermoBuscaAlterado($event)"
      (registrarBugSolicitado)="handleRegistrarBugSolicitado()"
    />
    <app-groove-strip
      [selectedFilter]="activeFilter"
      (filterSelected)="handleFilterSelected($event)"
    />

    <app-bug-grid
      [bugBuscado]="bugBuscado"
      [bugCriado]="bugCriado"
      [activeFilter]="activeFilter"
      [termoBusca]="termoBusca"
      (bugAlterado)="handleBugAlterado($event)"
      (bugDeletado)="handleBugDeletado($event)"
    />

  </main>

  <app-right-panel
    [openCreateSignal]="createPanelSignal"
    [bugAtualizado]="bugAlterado"
    [bugDeletadoId]="bugDeletadoId"
    (bugCriado)="handleBugCriado($event)"
  />
</div>
